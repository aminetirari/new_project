<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Blog — NutriMind (démo sans base de données)</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

	<style>
		:root {
			--accent: #ff6b6b;
			--accent-hover: #ff5252;
			--bg: #f6f7f9;
			--text: #1c1e21;
			--muted: #65676b;
			--border: #e4e6eb;
		}
		html, body { background: var(--bg); color: var(--text); font-family: 'Open Sans', sans-serif; }
		a { color: var(--accent); }
		a:hover { color: var(--accent-hover); }

		/* ===== Navbar ===== */
		.site-nav {
			background: #fff;
			border-bottom: 1px solid var(--border);
			padding: 12px 0;
			position: sticky;
			top: 0;
			z-index: 1000;
			box-shadow: 0 1px 2px rgba(0,0,0,0.04);
		}
		.site-nav .brand { font-weight: 700; color: var(--accent); font-size: 22px; text-decoration: none; }
		.site-nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 4px; }
		.site-nav a.nav-link {
			color: var(--text); padding: 8px 16px; border-radius: 999px; font-weight: 600; text-decoration: none;
		}
		.site-nav a.nav-link:hover { background: #f0f2f5; }
		.site-nav a.nav-link.active { background: var(--accent); color: #fff; }

		/* ===== Layout ===== */
		.page-wrap { max-width: 720px; margin: 30px auto; padding: 0 15px; }
		.page-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
		.page-header p { color: var(--muted); margin-bottom: 24px; }

		/* ===== Cards (like Facebook) ===== */
		.card-fb {
			background: #fff; border: 1px solid var(--border); border-radius: 10px;
			margin-bottom: 18px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); overflow: hidden;
		}
		.card-fb .card-header-row {
			display:flex; align-items:center; padding: 14px 16px; gap: 12px;
		}
		.avatar {
			width: 40px; height: 40px; border-radius: 50%;
			background: linear-gradient(135deg, #ff6b6b, #feca57);
			color: #fff; font-weight: 700; display:flex; align-items:center; justify-content:center;
			flex-shrink: 0;
		}
		.meta { line-height: 1.25; }
		.meta .name { font-weight: 600; color: var(--text); }
		.meta .date { color: var(--muted); font-size: 12px; }

		.post-body { padding: 0 16px 14px; }
		.post-body .title { font-weight: 700; font-size: 20px; margin-bottom: 6px; }
		.post-body .content { white-space: pre-wrap; line-height: 1.55; }
		.post-img { width: 100%; display: block; max-height: 480px; object-fit: cover; background:#f0f2f5; }

		/* ===== Reactions bar ===== */
		.counts { display:flex; justify-content: space-between; align-items:center; padding: 10px 16px; color: var(--muted); font-size: 13px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
		.actions { display:flex; }
		.actions button {
			flex: 1; background:#fff; border:none; color: var(--muted); font-weight:600; padding: 10px;
			display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
			border-radius: 6px; margin: 4px;
		}
		.actions button:hover { background: #f0f2f5; }
		.actions button.active { color: var(--accent); }

		/* ===== Comments ===== */
		.comments { padding: 8px 16px 14px; background: #fafbfc; border-top: 1px solid var(--border); }
		.comment {
			display:flex; align-items:flex-start; gap: 10px; margin: 10px 0;
		}
		.comment .avatar { width: 32px; height: 32px; font-size: 13px; }
		.comment .bubble {
			background: #f0f2f5; border-radius: 14px; padding: 8px 12px; max-width: 100%;
		}
		.comment .bubble .name { font-weight: 600; font-size: 13px; }
		.comment .bubble .text { font-size: 14px; white-space: pre-wrap; }
		.comment-actions { margin-top: 4px; font-size: 12px; color: var(--muted); display:flex; gap: 12px; }
		.comment-actions button { background:none; border:none; padding:0; color: var(--muted); font-weight:600; cursor:pointer; }
		.comment-actions button.liked, .comment-actions button:hover { color: var(--accent); }

		.add-comment { display:flex; gap:8px; margin-top: 10px; }
		.add-comment input {
			flex:1; border: 1px solid var(--border); border-radius: 999px; padding: 8px 14px;
			background: #fff; outline: none; font-size: 14px;
		}
		.add-comment input:focus { border-color: var(--accent); }
		.add-comment button {
			background: var(--accent); color: #fff; border: none; border-radius: 999px;
			padding: 0 18px; font-weight: 600; cursor: pointer;
		}
		.add-comment button:hover { background: var(--accent-hover); }

		/* ===== Create post form ===== */
		.composer { padding: 16px; }
		.composer textarea {
			width:100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; resize: vertical; font-family: inherit;
		}
		.composer textarea:focus { outline: none; border-color: var(--accent); }
		.composer input[type="text"] {
			width:100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-family: inherit;
		}
		.composer input[type="text"]:focus { outline: none; border-color: var(--accent); }
		.composer-footer {
			display:flex; justify-content: space-between; align-items:center; margin-top: 10px; gap: 10px; flex-wrap: wrap;
		}
		.file-label {
			cursor: pointer; color: var(--muted); font-weight: 600; padding: 6px 10px; border-radius: 6px;
		}
		.file-label:hover { background: #f0f2f5; color: var(--accent); }
		.btn-publish {
			background: var(--accent); color:#fff; border:none; border-radius: 6px; padding: 8px 22px; font-weight: 700; cursor: pointer;
		}
		.btn-publish:hover { background: var(--accent-hover); }
		.btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }
		.img-preview {
			display:block; max-height: 220px; border-radius: 8px; margin-top: 10px; object-fit: cover;
		}
		.img-preview-wrap { position:relative; display:inline-block; }
		.img-remove {
			position:absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.6); color:#fff;
			border:none; border-radius: 50%; width: 26px; height: 26px; cursor:pointer;
		}

		.empty {
			text-align:center; padding: 40px 20px; color: var(--muted); background: #fff; border-radius: 10px; border: 1px dashed var(--border);
		}

		.author-label { font-size: 12px; color: var(--muted); margin-right: 8px; }
		.delete-btn { background:none; border:none; color: var(--muted); cursor: pointer; font-size: 12px; font-weight:600; }
		.delete-btn:hover { color: #c0392b; }
	</style>
</head>
<body>

<!-- ===== Navbar ===== -->
<nav class="site-nav">
	<div class="container d-flex justify-content-between align-items-center">
		<a href="#" class="brand"><i class="fas fa-leaf"></i> NutriMind</a>
		<ul>
			<li><a class="nav-link" href="#">Accueil</a></li>
			<li><a class="nav-link active" href="#">Posts</a></li>
			<li><a class="nav-link" href="#">À propos</a></li>
			<li><a class="nav-link" href="#">Contact</a></li>
		</ul>
	</div>
</nav>

<main class="page-wrap">

	<div class="page-header">
		<h1>Fil des posts</h1>
		<p>Démo 100% frontend — les données sont enregistrées dans le navigateur (<code>localStorage</code>). Vide le cache du navigateur pour tout réinitialiser.</p>
	</div>

	<!-- Identité (simple) -->
	<div class="card-fb composer" id="identity-card">
		<div class="d-flex align-items-center gap-3 flex-wrap">
			<span class="author-label">Vous publiez en tant que :</span>
			<input type="text" id="display-name" placeholder="Votre nom" maxlength="30">
			<button type="button" id="save-name" class="btn-publish" style="padding:6px 14px;">Enregistrer</button>
		</div>
	</div>

	<!-- Composer (nouveau post) -->
	<form class="card-fb composer" id="composer-form" autocomplete="off">
		<input type="text" id="post-title" placeholder="Titre de votre post…" maxlength="120" required>
		<textarea id="post-content" rows="3" placeholder="Quoi de neuf ?" required></textarea>
		<div id="composer-preview"></div>
		<div class="composer-footer">
			<label class="file-label" for="post-image">
				<i class="fas fa-image"></i> Ajouter une photo
			</label>
			<input type="file" id="post-image" accept="image/*" hidden>
			<button type="submit" class="btn-publish"><i class="fas fa-paper-plane"></i> Publier</button>
		</div>
	</form>

	<!-- Feed -->
	<div id="feed"></div>

</main>

<script>
/* =================================================================
   Standalone Blog — no backend, everything in localStorage.
   Data shape:
   {
     me: "Alice",
     posts: [
       {
         id, author, date, title, content, image (dataURL|null),
         likedBy: ["Alice"],
         comments: [ { id, author, date, text, likedBy: [] } ]
       }
     ]
   }
================================================================= */

const STORAGE_KEY = 'nutrimind_blog_v1';

const defaultState = {
	me: '',
	posts: []
};

function loadState() {
	try {
		const raw = localStorage.getItem(STORAGE_KEY);
		if (!raw) return { ...defaultState };
		const parsed = JSON.parse(raw);
		return { ...defaultState, ...parsed };
	} catch (e) {
		console.warn('state corrompu, reset', e);
		return { ...defaultState };
	}
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadState();

/* ---------- helpers ---------- */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function esc(s) {
	return String(s).replace(/[&<>"']/g, c => ({
		'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
	}[c]));
}

function initials(name) {
	if (!name) return '?';
	return name.trim().split(/\s+/).map(p => p[0]).slice(0,2).join('').toUpperCase();
}

function fmtDate(iso) {
	const d = new Date(iso);
	const diffMs = Date.now() - d.getTime();
	const diffMin = Math.floor(diffMs / 60000);
	if (diffMin < 1) return "à l'instant";
	if (diffMin < 60) return `il y a ${diffMin} min`;
	const diffH = Math.floor(diffMin / 60);
	if (diffH < 24) return `il y a ${diffH} h`;
	return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' }) +
	       ' à ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function requireMe() {
	if (!state.me) {
		alert('Renseigne un nom d\'affichage en haut de la page avant de publier / aimer / commenter.');
		document.getElementById('display-name').focus();
		return false;
	}
	return true;
}

/* ---------- rendering ---------- */
function render() {
	// identity
	document.getElementById('display-name').value = state.me || '';

	const feed = document.getElementById('feed');
	if (!state.posts.length) {
		feed.innerHTML = '<div class="empty"><i class="far fa-newspaper fa-2x mb-3"></i><p>Aucun post pour le moment. Publie le premier !</p></div>';
		return;
	}

	// newest first
	const sorted = [...state.posts].sort((a,b) => b.date.localeCompare(a.date));

	feed.innerHTML = sorted.map(p => {
		const liked = state.me && p.likedBy.includes(state.me);
		const canDelete = state.me && p.author === state.me;

		const commentsHTML = (p.comments || []).map(c => {
			const cLiked = state.me && c.likedBy.includes(state.me);
			const canDelC = state.me && c.author === state.me;
			return `
			<div class="comment" data-post="${p.id}" data-comment="${c.id}">
				<div class="avatar">${esc(initials(c.author))}</div>
				<div style="flex:1;">
					<div class="bubble">
						<div class="name">${esc(c.author)}</div>
						<div class="text">${esc(c.text)}</div>
					</div>
					<div class="comment-actions">
						<button class="like-comment ${cLiked ? 'liked' : ''}" type="button">
							<i class="${cLiked ? 'fas' : 'far'} fa-heart"></i>
							J'aime${c.likedBy.length ? ' · ' + c.likedBy.length : ''}
						</button>
						<span>${esc(fmtDate(c.date))}</span>
						${canDelC ? '<button class="delete-comment delete-btn" type="button"><i class="fas fa-trash"></i> Supprimer</button>' : ''}
					</div>
				</div>
			</div>`;
		}).join('');

		return `
		<article class="card-fb" data-post="${p.id}">
			<div class="card-header-row">
				<div class="avatar">${esc(initials(p.author))}</div>
				<div class="meta">
					<div class="name">${esc(p.author)}</div>
					<div class="date">${esc(fmtDate(p.date))}</div>
				</div>
				<div class="ms-auto">
					${canDelete ? '<button class="delete-post delete-btn" type="button" title="Supprimer"><i class="fas fa-trash"></i></button>' : ''}
				</div>
			</div>
			<div class="post-body">
				<div class="title">${esc(p.title)}</div>
				<div class="content">${esc(p.content)}</div>
			</div>
			${p.image ? `<img class="post-img" src="${p.image}" alt="">` : ''}
			<div class="counts">
				<span><i class="fas fa-heart" style="color:${p.likedBy.length ? 'var(--accent)' : 'var(--muted)'}"></i> ${p.likedBy.length}</span>
				<span>${(p.comments || []).length} commentaire${(p.comments || []).length > 1 ? 's' : ''}</span>
			</div>
			<div class="actions">
				<button class="like-post ${liked ? 'active' : ''}" type="button">
					<i class="${liked ? 'fas' : 'far'} fa-heart"></i> J'aime
				</button>
				<button class="focus-comment" type="button">
					<i class="far fa-comment"></i> Commenter
				</button>
			</div>
			<div class="comments">
				${commentsHTML || '<p class="text-muted small mb-2" style="color:var(--muted);">Aucun commentaire. Sois le premier.</p>'}
				<form class="add-comment">
					<input type="text" placeholder="Écrire un commentaire…" maxlength="500" required>
					<button type="submit"><i class="fas fa-paper-plane"></i></button>
				</form>
			</div>
		</article>`;
	}).join('');
}

/* ---------- events ---------- */
document.getElementById('save-name').addEventListener('click', () => {
	const name = document.getElementById('display-name').value.trim();
	state.me = name;
	saveState();
	render();
});

let pendingImage = null;

document.getElementById('post-image').addEventListener('change', e => {
	const file = e.target.files[0];
	if (!file) { pendingImage = null; renderPreview(); return; }
	if (!/^image\//.test(file.type)) { alert('Veuillez choisir un fichier image.'); return; }
	if (file.size > 5 * 1024 * 1024) { alert('Image trop lourde (max 5 Mo).'); return; }
	const reader = new FileReader();
	reader.onload = ev => {
		pendingImage = ev.target.result;
		renderPreview();
	};
	reader.readAsDataURL(file);
});

function renderPreview() {
	const prev = document.getElementById('composer-preview');
	if (!pendingImage) { prev.innerHTML = ''; return; }
	prev.innerHTML = `
		<div class="img-preview-wrap">
			<img class="img-preview" src="${pendingImage}" alt="">
			<button type="button" class="img-remove" id="img-remove-btn" title="Retirer"><i class="fas fa-times"></i></button>
		</div>`;
	document.getElementById('img-remove-btn').addEventListener('click', () => {
		pendingImage = null;
		document.getElementById('post-image').value = '';
		renderPreview();
	});
}

document.getElementById('composer-form').addEventListener('submit', e => {
	e.preventDefault();
	if (!requireMe()) return;
	const title = document.getElementById('post-title').value.trim();
	const content = document.getElementById('post-content').value.trim();
	if (!title || !content) return;
	state.posts.push({
		id: uid(),
		author: state.me,
		date: new Date().toISOString(),
		title, content,
		image: pendingImage,
		likedBy: [],
		comments: []
	});
	saveState();

	// reset form
	document.getElementById('post-title').value = '';
	document.getElementById('post-content').value = '';
	document.getElementById('post-image').value = '';
	pendingImage = null;
	renderPreview();
	render();
});

// event delegation for posts / comments
document.getElementById('feed').addEventListener('click', e => {
	const postEl = e.target.closest('article[data-post]');
	if (!postEl) return;
	const postId = postEl.dataset.post;
	const post = state.posts.find(p => p.id === postId);
	if (!post) return;

	if (e.target.closest('.like-post')) {
		if (!requireMe()) return;
		togglePresence(post.likedBy, state.me);
		saveState(); render();
		return;
	}

	if (e.target.closest('.delete-post')) {
		if (!confirm('Supprimer ce post et tous ses commentaires ?')) return;
		state.posts = state.posts.filter(p => p.id !== postId);
		saveState(); render();
		return;
	}

	if (e.target.closest('.focus-comment')) {
		postEl.querySelector('.add-comment input').focus();
		return;
	}

	const commentEl = e.target.closest('.comment');
	if (commentEl) {
		const commentId = commentEl.dataset.comment;
		const comment = (post.comments || []).find(c => c.id === commentId);
		if (!comment) return;
		if (e.target.closest('.like-comment')) {
			if (!requireMe()) return;
			togglePresence(comment.likedBy, state.me);
			saveState(); render();
			return;
		}
		if (e.target.closest('.delete-comment')) {
			if (!confirm('Supprimer ce commentaire ?')) return;
			post.comments = post.comments.filter(c => c.id !== commentId);
			saveState(); render();
			return;
		}
	}
});

document.getElementById('feed').addEventListener('submit', e => {
	if (!e.target.classList.contains('add-comment')) return;
	e.preventDefault();
	if (!requireMe()) return;
	const postEl = e.target.closest('article[data-post]');
	const post = state.posts.find(p => p.id === postEl.dataset.post);
	if (!post) return;
	const input = e.target.querySelector('input');
	const text = input.value.trim();
	if (!text) return;
	post.comments = post.comments || [];
	post.comments.push({
		id: uid(),
		author: state.me,
		date: new Date().toISOString(),
		text,
		likedBy: []
	});
	saveState();
	input.value = '';
	render();
});

function togglePresence(arr, value) {
	const i = arr.indexOf(value);
	if (i === -1) arr.push(value); else arr.splice(i, 1);
}

/* ---------- seed (1 demo post) ---------- */
if (!state.posts.length && !state.me) {
	state.me = 'Invité';
	state.posts.push({
		id: uid(),
		author: 'NutriMind',
		date: new Date().toISOString(),
		title: 'Bienvenue sur le blog NutriMind',
		content: 'Publie ton premier post, réagis et commente 👇\nTout est stocké dans ton navigateur (localStorage), aucune base de données requise.',
		image: null,
		likedBy: [],
		comments: [
			{ id: uid(), author: 'Alice', date: new Date(Date.now()-3600e3).toISOString(), text: 'Super interface, hâte d\'essayer !', likedBy: [] }
		]
	});
	saveState();
}

render();
</script>
</body>
</html>
